apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app-canary
  labels:
    app: nodejs-app
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-app
      track: canary
  template:
    metadata:
      labels:
        app: nodejs-app
        track: canary
    spec:
      containers:
      - name: nodejs-app
        image: preethamkmenon/nodejs-cicd-app:latest
        ports:
        - containerPort: 3000
